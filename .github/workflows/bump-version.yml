name: Bump app version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: bump app version')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        run: npm run version:bump

      - name: Write release notes
        run: npm run release-notes:write

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json public/app-release-notes.json
          git diff --cached --quiet || git commit -m "chore: bump app version"

      - name: Push version bump
        run: git push
